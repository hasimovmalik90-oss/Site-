<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Аватарка профиля · кандидаты · Георгий</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0B0B0C;--soft:#121214;--card:#141416;--line:#1F1E1D;--text:#E8E4DE;--mute:#9E988E;--dim:#6A645B;--accent:#C9B79B}
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;width:100%;max-width:100%}
body{background:var(--bg);color:var(--text);font-family:Mulish,system-ui,sans-serif;font-weight:300;line-height:1.6;
background-image:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(201,183,155,.06),transparent 70%);background-attachment:fixed;-webkit-text-size-adjust:100%}
.wrap{max-width:1000px;margin:0 auto;padding:0 24px}
h1{font-family:'Cormorant Garamond',serif;font-weight:300;color:#F2EEE8;font-size:clamp(38px,7vw,64px);letter-spacing:.04em;line-height:1.1}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:16px;display:block}
.hero{text-align:center;padding:84px 0 40px}
.hero .fio{font-size:13px;letter-spacing:.26em;text-transform:uppercase;color:var(--mute);margin-bottom:14px}
.hero p.sub{max-width:620px;margin:20px auto 0;color:var(--mute);font-size:15px}
.hdiv{width:60px;height:1px;background:var(--accent);opacity:.5;margin:30px auto 0}
.list{padding:30px 0 80px}
.cand{display:flex;gap:34px;align-items:center;padding:30px 0;border-top:1px solid var(--line)}
.cand:first-child{border-top:none}
.left{flex:none;text-align:center}
.num{font-family:'Cormorant Garamond',serif;font-size:34px;color:var(--accent);margin-bottom:14px}
.ava{width:188px;height:188px;border-radius:50%;object-fit:cover;border:2px solid rgba(201,183,155,.4);background:#000;display:block}
.cap{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-top:12px}
.full{flex:1;min-width:0;text-align:center}
.full img{max-width:100%;max-height:440px;border-radius:14px;border:1px solid var(--line);background:#000}
@media(max-width:680px){
  .cand{flex-direction:column;gap:18px}
  .ava{width:150px;height:150px}
  .full img{max-height:64vh}
}
</style></head><body>

<header class="hero"><div class="wrap">
  <p class="fio">Георгий · @georgiy_gs</p>
  <span class="eyebrow">Аватарка профиля · кандидаты</span>
  <h1>Аватарка</h1>
  <p class="sub">Слева — как кадр сядет в круглую аватарку профиля. Справа — полный снимок. Пять кандидатов.</p>
  <div class="hdiv"></div>
</div></header>

<section class="list"><div class="wrap">

  <div class="cand">
    <div class="left"><div class="num">01</div>
      <img class="ava" src="img/cand1.jpg" style="object-position:25% 42%" alt="Кандидат 1">
      <div class="cap">в аватарке</div></div>
    <div class="full"><img src="img/cand1.jpg" alt="Кандидат 1 — полный кадр"></div>
  </div>

  <div class="cand">
    <div class="left"><div class="num">02</div>
      <img class="ava" src="img/cand2.jpg" style="object-position:50% 52%" alt="Кандидат 2">
      <div class="cap">в аватарке</div></div>
    <div class="full"><img src="img/cand2.jpg" alt="Кандидат 2 — полный кадр"></div>
  </div>

  <div class="cand">
    <div class="left"><div class="num">03</div>
      <img class="ava" src="img/cand3.jpg" style="object-position:50% 50%" alt="Кандидат 3">
      <div class="cap">в аватарке</div></div>
    <div class="full"><img src="img/cand3.jpg" alt="Кандидат 3 — полный кадр"></div>
  </div>

  <div class="cand">
    <div class="left"><div class="num">04</div>
      <img class="ava" src="img/cand4.jpg" style="object-position:50% 18%" alt="Кандидат 4">
      <div class="cap">в аватарке</div></div>
    <div class="full"><img src="img/cand4.jpg" alt="Кандидат 4 — полный кадр"></div>
  </div>

  <div class="cand">
    <div class="left"><div class="num">05</div>
      <img class="ava" src="img/cand5.jpg" style="object-position:47% 14%" alt="Кандидат 5">
      <div class="cap">в аватарке</div></div>
    <div class="full"><img src="img/cand5.jpg" alt="Кандидат 5 — полный кадр"></div>
  </div>

</div></section>

</body></html>
