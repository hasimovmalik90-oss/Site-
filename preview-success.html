<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Превью — Успешная отправка</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0c14; --bg2:#151120; --bg3:#1c1628;
  --gold:#d4b578; --gold-lt:#f0d8a8; --gold-dim:#a08050;
  --cream:#faf4ec; --cream-mid:#e0d4c8; --cream-dim:#c8b8a8;
  --line:rgba(212,181,120,.24);
  --glow-gold:0 0 22px rgba(240,216,168,.6),0 0 55px rgba(212,181,120,.35),0 0 90px rgba(212,181,120,.18);
  --glow-icon:0 0 12px rgba(212,181,120,.85),0 0 28px rgba(212,181,120,.45);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;}

.anketa-box{background:var(--bg);border:1px solid rgba(212,181,120,.28);max-width:520px;width:100%;margin:auto;padding:56px 40px 44px;position:relative;overflow:hidden;}
.anketa-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,var(--gold) 50%,transparent 95%);box-shadow:0 0 24px rgba(212,181,120,.55),0 0 70px rgba(212,181,120,.25);}
.anketa-box::after{content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(212,181,120,.08) 0%,transparent 70%);pointer-events:none;}
.anketa-orb{position:absolute;bottom:-60px;left:-60px;width:250px;height:250px;background:radial-gradient(circle,rgba(176,112,128,.1) 0%,transparent 70%);pointer-events:none;}

.anketa-success{text-align:center;padding:60px 20px;max-width:380px;margin:0 auto;}
.anketa-success svg{display:block;margin:0 auto;}
.anketa-success h3{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.5rem;color:var(--cream);margin-bottom:16px;text-shadow:0 0 22px rgba(212,181,120,.35);line-height:1.45;}
.anketa-success p{color:var(--gold-dim);font-size:.85rem;line-height:1.6;}
</style>
</head>
<body>
  <div class="anketa-box">
    <div class="anketa-orb"></div>
    <div class="anketa-success" style="display:block;">
      <svg width="28" height="28" viewBox="0 0 28 28" style="margin-bottom:16px;filter:drop-shadow(0 0 12px rgba(212,181,120,.8)) drop-shadow(0 0 28px rgba(212,181,120,.4));"><rect x="14" y="2" width="17" height="17" rx="2" transform="rotate(45 14 2)" fill="var(--gold)"/></svg>
      <h3>Поздравляю, ты сделала первый шаг к своим изобильным отношениям ❤️‍🔥</h3>
      <p>Ксения свяжется с тобой в ближайшее время.<br>Жди сообщение в Telegram.</p>
    </div>
  </div>
</body>
</html>
